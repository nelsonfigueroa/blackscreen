name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Build app
        run: ./build.sh

      - name: Zip app bundle
        run: zip -r BlackScreen.app.zip BlackScreen.app

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: BlackScreen.app.zip
          generate_release_notes: true
